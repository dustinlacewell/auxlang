<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Auxlang Audio Test Suite</title>
	<style>
		* { box-sizing: border-box; }
		body {
			margin: 0;
			padding: 20px;
			font-family: system-ui, sans-serif;
			background: #1a1a1a;
			color: #fff;
			max-width: 1200px;
			margin: 0 auto;
		}
		h1 { margin: 0 0 10px; font-size: 1.5rem; }
		h2 { margin: 20px 0 10px; font-size: 1.1rem; color: #8cf; border-bottom: 1px solid #444; padding-bottom: 5px; }
		.info { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
		.test-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
			gap: 10px;
		}
		.test-card {
			background: #2a2a2a;
			border: 1px solid #444;
			border-radius: 6px;
			padding: 12px;
		}
		.test-card.playing { border-color: #4a9; }
		.test-card.error { border-color: #a44; background: #2a1a1a; }
		.test-name {
			font-weight: bold;
			margin-bottom: 4px;
			display: flex;
			align-items: center;
			gap: 8px;
		}
		.test-name .status {
			width: 8px;
			height: 8px;
			border-radius: 50%;
			background: #666;
		}
		.test-card.playing .status { background: #4a9; }
		.test-card.error .status { background: #a44; }
		.test-desc {
			font-size: 0.85rem;
			color: #aaa;
			margin-bottom: 8px;
		}
		.test-code {
			font-family: 'Fira Code', 'Consolas', monospace;
			font-size: 0.75rem;
			background: #1a1a1a;
			padding: 8px;
			border-radius: 4px;
			overflow-x: auto;
			white-space: pre;
			margin-bottom: 8px;
			max-height: 120px;
			overflow-y: auto;
		}
		.test-buttons {
			display: flex;
			gap: 8px;
		}
		button {
			padding: 6px 12px;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-size: 12px;
		}
		button:hover { opacity: 0.9; }
		.play-btn { background: #4a9; color: white; }
		.stop-btn { background: #a44; color: white; }
		.stop-all {
			position: fixed;
			top: 20px;
			right: 20px;
			padding: 10px 20px;
			font-size: 14px;
			background: #a44;
			color: white;
			z-index: 100;
		}
		.error-msg {
			font-size: 0.75rem;
			color: #faa;
			margin-top: 8px;
			font-family: monospace;
		}
	</style>
</head>
<body>
	<h1>Auxlang Audio Test Suite</h1>
	<p class="info">Click "Play" on any test to hear it. Each test should produce a distinct, recognizable sound. Click "Stop All" to silence everything.</p>
	<button class="stop-all" id="stopAll">⏹ Stop All</button>

	<div id="tests"></div>

	<script type="module">
		import * as api from '/src/editor/api.ts';
		import { compile } from '/src/runtime/compile.ts';
		import { resetIdCounter } from '/src/descriptor/identity.ts';
		import { clearRegistry } from '/src/descriptor/registry.ts';

		// Make API available globally for tests
		Object.assign(window, api);

		// Worklet URL
		const processorUrl = new URL('/src/runtime/processor.ts', import.meta.url).href;

		const tests = [
			// === OSCILLATORS ===
			{
				category: "Oscillators",
				name: "osc (sine)",
				desc: "Pure sine wave at 440Hz - smooth, no harmonics",
				code: `return out(gain(osc(440)).amount(0.3))`
			},
			{
				category: "Oscillators",
				name: "saw",
				desc: "Sawtooth wave at 220Hz - bright, buzzy",
				code: `return out(gain(saw(220)).amount(0.2))`
			},
			{
				category: "Oscillators",
				name: "sqr",
				desc: "Square wave at 330Hz - hollow, clarinet-like",
				code: `return out(gain(sqr(330)).amount(0.2))`
			},
			{
				category: "Oscillators",
				name: "tri",
				desc: "Triangle wave at 440Hz - soft, flute-like",
				code: `return out(gain(tri(440)).amount(0.3))`
			},
			{
				category: "Oscillators",
				name: "noise",
				desc: "White noise - hissy, all frequencies",
				code: `return out(gain(noise()).amount(0.15))`
			},
			{
				category: "Oscillators",
				name: "lfo → pitch",
				desc: "Sine with vibrato - pitch should wobble",
				code: `let freq = add(440).b(mult(lfo(5)).b(20))
return out(gain(osc(freq)).amount(0.3))`
			},

			// === DRUMS ===
			{
				category: "Drums",
				name: "kick",
				desc: "808-style kick drum - deep thump",
				code: `let clk = clock(120)
let seq1 = seq("c1 c1 c1 c1").trig(clk.trig).gateIn(clk.gate)
return out(kick(seq1.gate).pitch(50).decay(0.3).sweep(3))`
			},
			{
				category: "Drums",
				name: "snare",
				desc: "808-style snare - punchy with noise",
				code: `let clk = clock(120)
let seq1 = seq("~ c1 ~ c1").trig(clk.trig).gateIn(clk.gate)
return out(snare(seq1.gate).tone(0.5).decay(0.15).snappy(0.5))`
			},
			{
				category: "Drums",
				name: "hihat",
				desc: "808-style hihat - metallic tick",
				code: `let clk = clock(120)
let seq1 = seq("c1 c1 c1 c1 c1 c1 c1 c1").trig(clk.trig).gateIn(clk.gate)
return out(gain(hihat(seq1.gate).decay(0.05).tone(0.7)).amount(0.5))`
			},
			{
				category: "Drums",
				name: "clap",
				desc: "808-style clap - layered snappy sound",
				code: `let clk = clock(120)
let seq1 = seq("~ c1 ~ c1").trig(clk.trig).gateIn(clk.gate)
return out(clap(seq1.gate).decay(0.2))`
			},
			{
				category: "Drums",
				name: "drum kit combined",
				desc: "All drums together - full beat",
				code: `let clk = clock(120)
let k = seq("c1 ~ ~ c1 c1 ~ ~ ~").trig(clk.trig).gateIn(clk.gate)
let s = seq("~ ~ c1 ~ ~ ~ c1 ~").trig(clk.trig).gateIn(clk.gate)
let h = seq("c1 c1 c1 c1 c1 c1 c1 c1").trig(clk.trig).gateIn(clk.gate)
let drums = mix(kick(k.gate)).b(snare(s.gate)).c(gain(hihat(h.gate).decay(0.04)).amount(0.3))
return out(gain(drums).amount(0.7))`
			},

			// === SEQUENCING ===
			{
				category: "Sequencing",
				name: "seq - basic notes",
				desc: "C major arpeggio - should hear c4 e4 g4 c5",
				code: `let clk = clock(120)
let s = seq("c4 e4 g4 c5").trig(clk.trig).gateIn(clk.gate)
let env1 = adsr(s.gate).attack(0.01).decay(0.1).sustain(0.3).release(0.1)
return out(mult(lpf(saw(s.cv)).cutoff(2000)).b(env1.out))`
			},
			{
				category: "Sequencing",
				name: "seq - rests (~)",
				desc: "Notes with gaps - c4 _ e4 _",
				code: `let clk = clock(120)
let s = seq("c4 ~ e4 ~").trig(clk.trig).gateIn(clk.gate)
let env1 = adsr(s.gate).attack(0.01).decay(0.1).sustain(0.5).release(0.1)
return out(mult(lpf(saw(s.cv)).cutoff(1500)).b(env1.out))`
			},
			{
				category: "Sequencing",
				name: "seq - groups []",
				desc: "Subdivided notes - [c4 e4] plays twice as fast",
				code: `let clk = clock(120)
let s = seq("c4 [e4 g4] c5 [g4 e4]").trig(clk.trig).gateIn(clk.gate)
let env1 = adsr(s.gate).attack(0.005).decay(0.08).sustain(0.3).release(0.05)
return out(mult(lpf(saw(s.cv)).cutoff(2000)).b(env1.out))`
			},
			{
				category: "Sequencing",
				name: "seq - multiply (*)",
				desc: "c4*4 = four c4s in one slot (fast repeat)",
				code: `let clk = clock(90)
let s = seq("c4*4 e4 g4*2 c5").trig(clk.trig).gateIn(clk.gate)
let env1 = adsr(s.gate).attack(0.005).decay(0.05).sustain(0.3).release(0.02)
return out(mult(lpf(saw(s.cv)).cutoff(2000)).b(env1.out))`
			},
			{
				category: "Sequencing",
				name: "seq - replicate (!)",
				desc: "c4!3 = three c4s taking 3 slots",
				code: `let clk = clock(120)
let s = seq("c4!3 g4").trig(clk.trig).gateIn(clk.gate)
let env1 = adsr(s.gate).attack(0.01).decay(0.1).sustain(0.5).release(0.1)
return out(mult(lpf(saw(s.cv)).cutoff(1500)).b(env1.out))`
			},
			{
				category: "Sequencing",
				name: "seq - elongate (@)",
				desc: "c4@3 = c4 held for 3 slots",
				code: `let clk = clock(120)
let s = seq("c4@3 g4").trig(clk.trig).gateIn(clk.gate)
let env1 = adsr(s.gate).attack(0.01).decay(0.2).sustain(0.7).release(0.3)
return out(mult(lpf(saw(s.cv)).cutoff(1200)).b(env1.out))`
			},
			{
				category: "Sequencing",
				name: "seq - alternation (<>)",
				desc: "<c4 e4 g4> cycles each loop",
				code: `let clk = clock(180)
let s = seq("<c4 e4 g4>").trig(clk.trig).gateIn(clk.gate)
let env1 = adsr(s.gate).attack(0.01).decay(0.15).sustain(0.4).release(0.1)
return out(mult(lpf(saw(s.cv)).cutoff(1500)).b(env1.out))`
			},
			{
				category: "Sequencing",
				name: "seq - euclidean (k,n)",
				desc: "c4(3,8) = 3 hits spread over 8 steps",
				code: `let clk = clock(140)
let s = seq("c4(3,8)").trig(clk.trig).gateIn(clk.gate)
let env1 = adsr(s.gate).attack(0.01).decay(0.1).sustain(0.3).release(0.1)
return out(mult(lpf(saw(s.cv)).cutoff(2000)).b(env1.out))`
			},
			{
				category: "Sequencing",
				name: "seq - sharps/flats",
				desc: "c#4 db4 f#4 gb4 - chromatic",
				code: `let clk = clock(120)
let s = seq("c#4 db4 f#4 gb4").trig(clk.trig).gateIn(clk.gate)
let env1 = adsr(s.gate).attack(0.01).decay(0.1).sustain(0.4).release(0.1)
return out(mult(lpf(saw(s.cv)).cutoff(1800)).b(env1.out))`
			},

			// === ENVELOPES ===
			{
				category: "Envelopes",
				name: "env (AR)",
				desc: "Attack-Release envelope - ramp up, ramp down",
				code: `let clk = clock(60)
let s = seq("c4 ~ ~ ~").trig(clk.trig).gateIn(clk.gate)
let e = env(s.gate).attack(0.3).release(0.5)
return out(mult(osc(s.cv)).b(e.out))`
			},
			{
				category: "Envelopes",
				name: "adsr - plucky",
				desc: "Fast attack, short decay - plucky sound",
				code: `let clk = clock(120)
let s = seq("c4 e4 g4 c5").trig(clk.trig).gateIn(clk.gate)
let e = adsr(s.gate).attack(0.005).decay(0.1).sustain(0.1).release(0.05)
return out(mult(saw(s.cv)).b(e.out))`
			},
			{
				category: "Envelopes",
				name: "adsr - pad",
				desc: "Slow attack, high sustain - pad sound",
				code: `let clk = clock(40)
let s = seq("c3 g3").trig(clk.trig).gateIn(clk.gate)
let e = adsr(s.gate).attack(0.4).decay(0.3).sustain(0.7).release(0.5)
return out(gain(mult(lpf(saw(s.cv)).cutoff(800)).b(e.out)).amount(0.5))`
			},

			// === FILTERS ===
			{
				category: "Filters",
				name: "lpf - static",
				desc: "Low-pass at 500Hz - muffled saw",
				code: `return out(gain(lpf(saw(220)).cutoff(500)).amount(0.3))`
			},
			{
				category: "Filters",
				name: "lpf - resonant",
				desc: "High resonance - whistly peak",
				code: `return out(gain(lpf(saw(110)).cutoff(800).resonance(0.8)).amount(0.2))`
			},
			{
				category: "Filters",
				name: "lpf - modulated",
				desc: "LFO on cutoff - wah-wah effect",
				code: `let cut = lfo(2).min(300).max(2000)
return out(gain(lpf(saw(110)).cutoff(cut).resonance(0.4)).amount(0.25))`
			},
			{
				category: "Filters",
				name: "hpf - static",
				desc: "High-pass at 1000Hz - thin, trebly",
				code: `return out(gain(hpf(saw(110)).cutoff(1000)).amount(0.3))`
			},

			// === EFFECTS ===
			{
				category: "Effects",
				name: "delay - echo",
				desc: "Delay with feedback - repeating echoes",
				code: `let clk = clock(120)
let s = seq("c4 ~ ~ ~ e4 ~ ~ ~").trig(clk.trig).gateIn(clk.gate)
let e = adsr(s.gate).attack(0.01).decay(0.1).sustain(0.2).release(0.1)
let dry = mult(lpf(saw(s.cv)).cutoff(1500)).b(e.out)
return out(delay(dry).time(0.25).feedback(0.5).mix(0.4))`
			},

			// === UTILITIES ===
			{
				category: "Utilities",
				name: "mix - 4 channel",
				desc: "Four detuned saws - thick unison",
				code: `let f = 220
let s1 = saw(f)
let s2 = saw(mult(f).b(1.005))
let s3 = saw(mult(f).b(0.995))
let s4 = saw(mult(f).b(1.01))
return out(gain(lpf(mix(s1).b(s2).c(s3).d(s4)).cutoff(1200)).amount(0.15))`
			},
			{
				category: "Utilities",
				name: "slew - portamento",
				desc: "Glide between notes - smooth pitch change",
				code: `let clk = clock(60)
let s = seq("c3 g3 e3 c4").trig(clk.trig).gateIn(clk.gate)
let smoothPitch = slew(s.cv).rise(0.1).fall(0.1)
let e = adsr(s.gate).attack(0.01).decay(0.2).sustain(0.6).release(0.2)
return out(mult(lpf(saw(smoothPitch)).cutoff(1000)).b(e.out))`
			},
			{
				category: "Utilities",
				name: "gain",
				desc: "Volume control - quiet sine",
				code: `return out(gain(osc(440)).amount(0.1))`
			},

			// === MATH ===
			{
				category: "Math",
				name: "mult - ring mod",
				desc: "Two oscs multiplied - metallic sound",
				code: `return out(gain(mult(osc(440)).b(osc(110))).amount(0.3))`
			},
			{
				category: "Math",
				name: "add - mix signals",
				desc: "Two oscs added - chord",
				code: `return out(gain(add(osc(440)).b(osc(550))).amount(0.2))`
			},

			// === CLOCK/TIMING ===
			{
				category: "Clock",
				name: "clock - 60 BPM",
				desc: "Slow tempo - one beat per second",
				code: `let clk = clock(60)
let s = seq("c4").trig(clk.trig).gateIn(clk.gate)
return out(kick(s.gate))`
			},
			{
				category: "Clock",
				name: "clock - 140 BPM",
				desc: "Fast tempo - energetic",
				code: `let clk = clock(140)
let s = seq("c4").trig(clk.trig).gateIn(clk.gate)
return out(kick(s.gate))`
			},
			{
				category: "Clock",
				name: "clockDiv",
				desc: "Divide clock by 4 - one hit per bar",
				code: `let clk = clock(120)
let bar = clockDiv(clk.trig, 4)
return out(kick(bar.trig).pitch(40).decay(0.5))`
			},
			{
				category: "Clock",
				name: "counter",
				desc: "Count beats, modulo 4 - pitch changes each beat",
				code: `let clk = clock(120)
let s = seq("c4").trig(clk.trig).gateIn(clk.gate)
let cnt = counter(clk.trig).max(4)
let pitch = add(s.cv).b(mult(cnt.count).b(50))
let e = adsr(s.gate).attack(0.01).decay(0.1).sustain(0.3).release(0.1)
return out(mult(lpf(saw(pitch)).cutoff(1500)).b(e.out))`
			},

			// === LOGIC (for arrangement) ===
			{
				category: "Logic",
				name: "gte - gate drums",
				desc: "Drums start after beat 4",
				code: `let clk = clock(120)
let cnt = counter(clk.trig).max(8)
let drumsOn = gte(cnt.count).b(4)
let s = seq("c1").trig(clk.trig).gateIn(clk.gate)
return out(mult(kick(s.gate)).b(drumsOn))`
			},
			{
				category: "Logic",
				name: "lt - intro only",
				desc: "Sound only in first 4 beats",
				code: `let clk = clock(120)
let cnt = counter(clk.trig).max(8)
let introOn = lt(cnt.count).b(4)
let s = seq("c4 e4 g4 c5").trig(clk.trig).gateIn(clk.gate)
let e = adsr(s.gate).attack(0.01).decay(0.1).sustain(0.3).release(0.1)
return out(mult(mult(saw(s.cv)).b(e.out)).b(introOn))`
			},
			{
				category: "Logic",
				name: "and - range gate",
				desc: "Sound only in beats 2-5",
				code: `let clk = clock(120)
let cnt = counter(clk.trig).max(8)
let inRange = and(gte(cnt.count).b(2)).b(lt(cnt.count).b(6))
let s = seq("c4").trig(clk.trig).gateIn(clk.gate)
let e = adsr(s.gate).attack(0.01).decay(0.15).sustain(0.4).release(0.1)
return out(mult(mult(saw(s.cv)).b(e.out)).b(inRange))`
			},
		];

		// Group tests by category
		const byCategory = {};
		for (const test of tests) {
			if (!byCategory[test.category]) byCategory[test.category] = [];
			byCategory[test.category].push(test);
		}

		// Render tests
		const container = document.getElementById('tests');
		let testIndex = 0;

		for (const [category, categoryTests] of Object.entries(byCategory)) {
			const h2 = document.createElement('h2');
			h2.textContent = category;
			container.appendChild(h2);

			const grid = document.createElement('div');
			grid.className = 'test-grid';

			for (const test of categoryTests) {
				const card = document.createElement('div');
				card.className = 'test-card';
				card.dataset.index = testIndex++;
				card.innerHTML = `
					<div class="test-name"><span class="status"></span>${test.name}</div>
					<div class="test-desc">${test.desc}</div>
					<div class="test-code">${test.code}</div>
					<div class="test-buttons">
						<button class="play-btn">▶ Play</button>
						<button class="stop-btn">⏹ Stop</button>
					</div>
				`;
				grid.appendChild(card);
			}

			container.appendChild(grid);
		}

		// Audio context and worklet nodes per test
		const instances = {};  // { idx: { ctx, node } }

		async function createAudioInstance() {
			const ctx = new AudioContext();
			await ctx.audioWorklet.addModule(processorUrl);
			const node = new AudioWorkletNode(ctx, 'graph-processor');
			node.connect(ctx.destination);
			return { ctx, node };
		}

		function stopInstance(idx) {
			const instance = instances[idx];
			if (instance) {
				instance.node.port.postMessage({ type: 'stop' });
				instance.node.disconnect();
				instance.ctx.close();
				delete instances[idx];
			}
		}

		// Play handler
		document.addEventListener('click', async (e) => {
			if (e.target.classList.contains('play-btn')) {
				const card = e.target.closest('.test-card');
				const idx = card.dataset.index;
				const test = tests[idx];

				// Stop if already playing
				stopInstance(idx);

				try {
					// Reset descriptor state
					resetIdCounter();
					clearRegistry();

					// Evaluate code
					const wrappedCode = test.code.includes('return') ? test.code : `return (${test.code})`;
					const fn = new Function(...Object.keys(api), wrappedCode);
					const result = fn(...Object.values(api));

					// Create audio instance
					const instance = await createAudioInstance();
					instances[idx] = instance;

					// Send graph
					if (result && typeof result === 'object' && 'nodes' in result) {
						const compiled = compile(result);
						instance.node.port.postMessage({ type: 'setGraph', graph: compiled });
					}

					card.classList.remove('error');
					card.classList.add('playing');
					card.querySelector('.error-msg')?.remove();
				} catch (err) {
					card.classList.add('error');
					card.classList.remove('playing');
					const errDiv = document.createElement('div');
					errDiv.className = 'error-msg';
					errDiv.textContent = err.message;
					card.querySelector('.error-msg')?.remove();
					card.appendChild(errDiv);
					console.error('Test error:', err);
				}
			}

			if (e.target.classList.contains('stop-btn')) {
				const card = e.target.closest('.test-card');
				const idx = card.dataset.index;
				stopInstance(idx);
				card.classList.remove('playing');
			}
		});

		// Stop all
		document.getElementById('stopAll').addEventListener('click', () => {
			for (const idx of Object.keys(instances)) {
				stopInstance(idx);
			}
			document.querySelectorAll('.test-card').forEach(c => c.classList.remove('playing'));
		});
	</script>
</body>
</html>
