<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<rect width="64" height="64" rx="12" fill="#121214" />
	<!-- one short cable: out of the left plug, bend at the apex, into the right plug -->
	<path d="M17 34 C17 22 22 16 32 10 C42 16 47 22 47 34"
		fill="none" stroke="#4da3e8" stroke-width="5" stroke-linecap="round" />
	<!-- LEFT PLUG (tip down) -->
	<g>
		<rect x="12" y="32" width="10" height="4" rx="1.5" fill="#e8e8ec" />
		<rect x="10" y="36" width="14" height="14" rx="2.5" fill="#e8e8ec" />
		<rect x="14.5" y="50" width="5" height="10" rx="2.5" fill="#b8b8b8" />
		<rect x="14" y="53" width="6" height="1.6" fill="#121214" />
		<rect x="14" y="56.4" width="6" height="1.6" fill="#121214" />
	</g>
	<!-- RIGHT PLUG (tip down) -->
	<g>
		<rect x="42" y="32" width="10" height="4" rx="1.5" fill="#e8e8ec" />
		<rect x="40" y="36" width="14" height="14" rx="2.5" fill="#e8e8ec" />
		<rect x="44.5" y="50" width="5" height="10" rx="2.5" fill="#b8b8b8" />
		<rect x="44" y="53" width="6" height="1.6" fill="#121214" />
		<rect x="44" y="56.4" width="6" height="1.6" fill="#121214" />
	</g>
</svg>
