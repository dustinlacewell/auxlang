<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<rect width="64" height="64" rx="12" fill="#121214" />
	<!-- left leg of the /\ : whole assembly drawn vertical, rotated clockwise about the apex -->
	<g transform="rotate(24, 32, 8)">
		<path d="M32 8 L32 32" fill="none" stroke="#e8e8ec" stroke-width="5" stroke-linecap="round" />
		<rect x="27.5" y="30" width="9" height="4" rx="1.5" fill="#e8e8ec" />
		<rect x="25" y="34" width="14" height="13" rx="2.5" fill="#e8e8ec" />
		<rect x="29.5" y="47" width="5" height="10" rx="2.5" fill="#b8b8b8" />
		<rect x="29" y="50" width="6" height="1.6" fill="#121214" />
		<rect x="29" y="53.4" width="6" height="1.6" fill="#121214" />
	</g>
	<!-- right leg of the /\ : mirror rotation -->
	<g transform="rotate(-24, 32, 8)">
		<path d="M32 8 L32 32" fill="none" stroke="#e8e8ec" stroke-width="5" stroke-linecap="round" />
		<rect x="27.5" y="30" width="9" height="4" rx="1.5" fill="#e8e8ec" />
		<rect x="25" y="34" width="14" height="13" rx="2.5" fill="#e8e8ec" />
		<rect x="29.5" y="47" width="5" height="10" rx="2.5" fill="#b8b8b8" />
		<rect x="29" y="50" width="6" height="1.6" fill="#121214" />
		<rect x="29" y="53.4" width="6" height="1.6" fill="#121214" />
	</g>
</svg>
