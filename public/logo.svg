<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<rect width="64" height="64" rx="12" fill="#121214" />
	<!-- left leg of the /\ : whole assembly drawn vertical, rotated clockwise about the apex -->
	<g transform="rotate(24, 32, 6)">
		<path d="M32 6 L32 22" fill="none" stroke="#e8e8ec" stroke-width="4.5" stroke-linecap="round" />
		<rect x="28.5" y="20" width="7" height="3.5" rx="1.2" fill="#e8e8ec" />
		<rect x="26.5" y="23.5" width="11" height="17" rx="2" fill="#e8e8ec" />
		<rect x="30" y="40.5" width="4" height="11" rx="2" fill="#b8b8b8" />
		<rect x="29.5" y="44" width="5" height="1.6" fill="#121214" />
		<rect x="29.5" y="47.2" width="5" height="1.6" fill="#121214" />
	</g>
	<!-- right leg of the /\ : mirror rotation -->
	<g transform="rotate(-24, 32, 6)">
		<path d="M32 6 L32 22" fill="none" stroke="#e8e8ec" stroke-width="4.5" stroke-linecap="round" />
		<rect x="28.5" y="20" width="7" height="3.5" rx="1.2" fill="#e8e8ec" />
		<rect x="26.5" y="23.5" width="11" height="17" rx="2" fill="#e8e8ec" />
		<rect x="30" y="40.5" width="4" height="11" rx="2" fill="#b8b8b8" />
		<rect x="29.5" y="44" width="5" height="1.6" fill="#121214" />
		<rect x="29.5" y="47.2" width="5" height="1.6" fill="#121214" />
	</g>
</svg>
